<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj digital</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/197/197573.png" type="image/png">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #212529;
            --text-light: #ced4da;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            transition: cursor 0.3s ease;
        }

        .hide-cursor {
            cursor: none !important;
        }

        #clock-container {
            text-align: center;
            width: 100%;
            padding: 20px;
            user-select: none;
        }

        .time {
            font-size: clamp(3rem, 18vw, 12rem);
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 0.2em; 
        }

        .date {
            font-size: clamp(1rem, 4vw, 2.5rem);
            font-weight: 300;
            margin-bottom: 2.5rem; 
            letter-spacing: 1px;
        }

        .location {
            font-size: clamp(0.8rem, 2.5vw, 1.8rem);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6em;
            opacity: 0.9;
            margin-top: 1rem; 
        }

        .location img {
            height: 1em; 
            width: auto;
            filter: invert(27%) sepia(51%) saturate(2878%) hue-rotate(331%) brightness(104%) contrast(89%);
            vertical-align: middle;
        }

        .control-btn {
            position: absolute;
            bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 4px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease, opacity 0.5s ease;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover { background: rgba(255, 255, 255, 0.15); }
        .control-btn svg { fill: var(--text-light); width: 28px; height: 28px; }

        #play-btn { left: 30px; }
        #stop-btn { left: 80px; } 
        #prev-btn { left: 130px; }
        #next-btn { left: 180px; }
        #fs-button { right: 30px; }
    </style>
</head>
<body>

    <audio id="radio-stream"></audio>

    <button class="control-btn" id="play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="control-btn" id="stop-btn" title="Detener"><svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg></button>
    <button class="control-btn" id="prev-btn"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
    <button class="control-btn" id="next-btn"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/></svg></button>

    <div id="clock-container">
        <div class="date" id="current-date">Detectando fecha...</div>
        <div class="time" id="digital-clock">00:00:00</div>
        <div class="location">
            <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" alt="Icono">
            <span id="user-location">Buscando ubicación...</span>
        </div>
    </div>

    <button class="control-btn" id="fs-button" title="Pantalla completa">
        <svg viewBox="0 0 24 24" id="icon-fs">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
    </button>

    <script>
        const clockEl = document.getElementById('digital-clock');
        const dateEl = document.getElementById('current-date');
        const locationEl = document.getElementById('user-location');
        const fsButton = document.getElementById('fs-button');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const iconFs = document.getElementById('icon-fs');
        const audio = document.getElementById('radio-stream');
        
        let cursorTimer;
        let currentRadioIndex = 0;
        let userTimeZone = Intl.DateTimeFormat().resolvedOptions().timeZone; // Huso horario por defecto del sistema

        const playlist = [
            { name: "Radio Aspen 102.3 (Buenos Aires)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/ASPEN.mp3" },
            { name: "Radio Blue 100.7 (Buenos Aires)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/BLUE_FM_100_7AAC.aac" },
            { name: "Radio Cadena Heat 91.9 (Córdoba)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/CADENAHEAT_SC" },
            { name: "Radio Disney 94.3 (Buenos Aires)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/DISNEY_ARG_BA_ADP.m3u8?dist=web-radiodisney" },
            { name: "Radio La 100 99.9 (Buenos Aires)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/FM999_56AAC.aac" },
            { name: "Radio LN+ música 104.9 (Buenos Aires)", url: "https://stream.radio.co/s2ed3bec0a/listen" },
            { name: "Radio Los 40 105.5 (Buenos Aires)", url: "https://edge01.radiohdvivo.com/los40" },
            { name: "Radio Nacional LT12 Gral. Madariaga 840 AM (Paso de los Libres)", url: "http://sa.mp3.icecast.magma.edge-access.net:7200/sc_rad43" },
            { name: "Radio Mega 98.3 (Buenos Aires)", url: "https://mega.stweb.tv/mega983/live/chunks.m3u8" },
            { name: "Radio Metro 95.1 (Buenos Aires)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/METROAAC.aac" },
            { name: "Radio Pop 101.5 (Buenos Aires)", url: "https://popradio.stweb.tv/popradio/live/playlist.m3u8" },
            { name: "Radio Rock & Pop 95.9 (Buenos Aires)", url: "https://playerservices.streamtheworld.com/api/livestream-redirect/ROCKANDPOPAAC.aac" },
            { name: "Radio Sónica 102.3 (Paso de los Libres)", url: "https://01.solumedia.com.ar:8796/stream" },
            { name: "Radio Urbana Play 104.3 (Buenos Aires)", url: "http://ipanel.instream.audio:7102/stream" },
            { name: "Radio Vale 97.5 (Buenos Aires)", url: "http://vale.stweb.tv:1935/vale/live/playlist.m3u8" }
        ];

        // --- DETECCIÓN AUTOMÁTICA DE UBICACIÓN Y HUSO HORARIO ---
        async function autoDetectLocation() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data.city) {
                    locationEl.textContent = `${data.city}, ${data.region}, ${data.country_name}`;
                    userTimeZone = data.timezone; // Ajusta el reloj al huso horario de la IP detectada
                }
            } catch (error) {
                locationEl.textContent = "Ubicación basada en sistema";
                console.error("Error al detectar ubicación, usando configuración local.");
            }
        }
        autoDetectLocation();

        // --- RELOJ Y FECHA DINÁMICOS ---
        function updateClock() {
            const now = new Date();
            const timeOptions = { timeZone: userTimeZone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
            const dateOptions = { timeZone: userTimeZone, weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            
            clockEl.textContent = new Intl.DateTimeFormat('es-AR', timeOptions).format(now);
            let dateString = new Intl.DateTimeFormat('es-AR', dateOptions).format(now);
            dateEl.textContent = dateString.charAt(0).toUpperCase() + dateString.slice(1);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- LÓGICA DE RADIOS ---
        function loadRadio(index) {
            currentRadioIndex = (index + playlist.length) % playlist.length;
            audio.src = playlist[currentRadioIndex].url;
            updateTooltips();
        }

        function updateTooltips() {
            const current = playlist[currentRadioIndex];
            const prev = playlist[(currentRadioIndex - 1 + playlist.length) % playlist.length];
            const next = playlist[(currentRadioIndex + 1) % playlist.length];
            playBtn.title = "Reproduciendo: " + current.name;
            prevBtn.title = "Anterior: " + prev.name;
            nextBtn.title = "Siguiente: " + next.name;
        }

        playBtn.addEventListener('click', () => { if (!audio.src) loadRadio(currentRadioIndex); audio.play(); });
        stopBtn.addEventListener('click', () => { audio.pause(); });
        prevBtn.addEventListener('click', () => { loadRadio(currentRadioIndex - 1); audio.play(); });
        nextBtn.addEventListener('click', () => { loadRadio(currentRadioIndex + 1); audio.play(); });

        loadRadio(0);

        // --- GESTIÓN DE INTERFAZ (OCULTAR CONTROLES) ---
        function hideControls() {
            if (document.fullscreenElement) {
                document.body.classList.add('hide-cursor');
                document.querySelectorAll('.control-btn').forEach(b => b.style.opacity = "0");
            }
        }

        function showControls() {
            document.body.classList.remove('hide-cursor');
            document.querySelectorAll('.control-btn').forEach(b => b.style.opacity = "1");
            clearTimeout(cursorTimer);
            if (document.fullscreenElement) cursorTimer = setTimeout(hideControls, 3000);
        }
        document.addEventListener('mousemove', showControls);

        fsButton.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
                iconFs.innerHTML = '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>';
                cursorTimer = setTimeout(hideControls, 3000);
            } else {
                document.exitFullscreen();
                iconFs.innerHTML = '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
